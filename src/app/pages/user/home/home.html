<div class="bg-black text-white text-center py-5 mb-5" style="border-bottom: 5px solid #E20613;">
  <div class="container">
    <h1 class="display-5 fw-bold text-uppercase">Exclusive <span style="color: #E20613;">Events</span></h1>
    <p class="lead text-muted">จองตั๋วคอนเสิร์ตและอีเวนต์สุดพิเศษก่อนใคร</p>
  </div>
</div>

<div class="container mb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0" style="color: #1A1A1A; border-left: 5px solid #E20613; padding-left: 12px;">
      UPCOMING EVENTS
    </h3>
  </div>

  <div class="row g-4">
    <div class="col-12 col-md-6 col-lg-3" *ngFor="let event of events">
      <div class="card h-100 border-0 shadow-sm" style="border-radius: 6px; overflow: hidden; transition: transform 0.2s;">
        
        <div class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 180px;">
          <h5 class="text-uppercase m-0 opacity-75">{{ event.event_name }}</h5>
        </div>
        
        <div class="card-body d-flex flex-column bg-white">
          <h5 class="card-title fw-bold text-truncate" style="color: #1A1A1A;">
            {{ event.event_name }}
          </h5>
          <p class="card-text text-muted small mb-2">
            <i class="bi bi-calendar-event me-1"></i> 📅 {{ event.event_date | date:'dd MMM yyyy' }}
          </p>
          <p class="card-text text-muted small text-truncate mb-4">
            {{ event.description }}
          </p>
          
          <a [routerLink]="['/event', event.event_id]" class="btn w-100 fw-bold mt-auto" 
             style="background-color: #E20613; color: white; border-radius: 4px;">
             BUY TICKET
          </a>
        </div>
      </div>
    </div>
    
    <div *ngIf="events.length === 0" class="col-12 text-center py-5">
      <p class="text-muted">กำลังโหลดข้อมูลอีเวนต์...</p>
    </div>
  </div>
</div>
