<div class="container mt-5 mb-5">
  <h2 class="fw-bold mb-4">🎈 กิจกรรมทั้งหมด (Upcoming Events)</h2>

  <div class="text-center py-5" *ngIf="isLoading">
    <div class="spinner-border text-danger" role="status"></div>
    <p class="mt-3 text-muted">กำลังดึงข้อมูลกิจกรรม...</p>
  </div>

  <div class="row g-4" *ngIf="!isLoading && events.length > 0">
    <div class="col-md-6 col-lg-4" *ngFor="let item of events">
      <div class="card h-100 shadow-sm border-0 transition-hover">
        <div class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 180px;">
          <h4 class="text-uppercase m-0 opacity-75">{{ item.event_name }}</h4>
        </div>
        <div class="card-body p-4 d-flex flex-column">
          <h5 class="fw-bold mb-3">{{ item.event_name }}</h5>
          
          <p class="text-muted small mb-1"><i class="bi bi-calendar me-2"></i> {{ item.event_date | date:'dd MMM yyyy' }}</p>
          <p class="text-muted small mb-4"><i class="bi bi-geo-alt me-2"></i> {{ item.venue_name || 'รอประกาศ' }} ({{ item.city || '-' }})</p>
          
          <a [routerLink]="['/event', item.event_id]" class="btn btn-outline-danger w-100 mt-auto fw-bold rounded-pill">
            ดูรายละเอียด
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center py-5 bg-light rounded" *ngIf="!isLoading && events.length === 0">
    <h4 class="text-muted">ยังไม่มีกิจกรรมในขณะนี้</h4>
  </div>
</div>
