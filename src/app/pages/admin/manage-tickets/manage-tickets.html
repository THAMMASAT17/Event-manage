<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0"><i class="bi bi-ticket-perforated text-danger me-2"></i> จัดการตั๋ว (Manage Tickets)</h3>
    <button class="btn btn-danger fw-bold" (click)="showForm = !showForm">
      {{ showForm ? 'กลับ' : '+ เพิ่มประเภทตั๋ว' }}
    </button>
  </div>

  <div class="card border-0 shadow-sm mb-4" *ngIf="showForm">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">เลือกกิจกรรม (Event)</label>
          <select class="form-select" [(ngModel)]="formData.event_id">
            <option value="">-- เลือกกิจกรรม --</option>
            <option *ngFor="let e of events" [value]="e.event_id">{{ e.event_name }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">ประเภทตั๋ว (เช่น VIP, Standard)</label>
          <input type="text" class="form-control" [(ngModel)]="formData.ticket_type" placeholder="ระบุประเภท...">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">ราคา (บาท)</label>
          <input type="number" class="form-control" [(ngModel)]="formData.price">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">จำนวนตั๋วที่เปิดขาย</label>
          <input type="number" class="form-control" [(ngModel)]="formData.quantity">
        </div>
        <div class="col-12 text-end mt-4">
          <button class="btn btn-danger px-5" (click)="saveTicket()">บันทึกข้อมูลตั๋ว</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm" *ngIf="!showForm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="px-4">ID</th>
            <th>กิจกรรม</th>
            <th>ประเภทตั๋ว</th>
            <th>ราคา</th>
            <th>คงเหลือ</th>
            <th class="text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of tickets">
            <td class="px-4 text-muted">#{{ t.ticket_id }}</td>
            <td class="fw-bold text-primary">{{ t.event_name }}</td>
            <td><span class="badge bg-dark">{{ t.ticket_type }}</span></td>
            <td>{{ t.price | number }} บาท</td>
            <td>{{ t.quantity | number }} ใบ</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-danger" (click)="deleteTicket(t.ticket_id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
